site:
  title: "SampleLibrary Docs"
  description: "Documentation for the SampleLibrary demo project"
  url: "https://sample.mokadocs.dev"
  copyright: "© 2026 MokaDocs"

content:
  docs: ./docs
  projects:
    - path: ./Moka.Docs.Samples.Library.csproj
      label: "SampleLibrary"

theme:
  name: default
  options:
    primaryColor: "#0ea5e9"
    accentColor: "#f59e0b"
    showEditLink: false
    showLastUpdated: true
    socialLinks:
      - icon: github
        url: "https://github.com/jacobwi/Moka.Docs"
      - icon: nuget
        url: "https://www.nuget.org/packages/Moka.Docs.Core"
      - icon: discord
        url: "https://discord.gg/mokadocs"
      - icon: twitter
        url: "https://twitter.com/mokadocs"

features:
  search:
    enabled: true
    provider: pagefind
  versioning:
    enabled: true
    strategy: dropdown-only
    versions:
      - label: "v2.0"
        branch: main
        default: true
      - label: "v1.0"
        branch: release/1.0
      - label: "v3.0-beta"
        branch: dev
        prerelease: true

plugins:
  - name: mokadocs-repl
  - name: mokadocs-blazor-preview
  - name: mokadocs-changelog

nav:
  - label: "API Reference"
    path: /api
    icon: code
    autoGenerate: true
  - label: "Guide"
    path: /guide
    icon: book-open
    expanded: true
  - label: "Blog"
    path: /blog
    icon: rss
  - label: "SampleLibrary"
    path: /
    icon: package

build:
  output: ./_site
  clean: true
  sitemap: true
  robots: true
