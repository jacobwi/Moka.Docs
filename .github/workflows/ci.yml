name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MokaDocs.sln

      - name: Build
        run: dotnet build MokaDocs.sln --no-restore --configuration Release -warnaserror

      - name: Test
        run: dotnet test MokaDocs.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Build documentation site
        run: dotnet run --project src/Moka.Docs.Cli --configuration Release --framework net9.0 -- build --output ./_site

      - name: Upload docs artifact
        uses: actions/upload-artifact@v5
        with:
          name: docs-site
          path: _site/
